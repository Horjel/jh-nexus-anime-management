spring.application.name=jh-nexus-anime
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/otaku_center?useSSL=false&serverTimezone=Europe/Madrid&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

app.security.users-file=${APP_SECURITY_USERS_FILE:file:./USUARIOS_PROYECTO.txt}
app.security.bootstrap.enabled=${APP_SECURITY_BOOTSTRAP_ENABLED:false}
app.demo.catalog-bootstrap.enabled=${APP_DEMO_CATALOG_BOOTSTRAP_ENABLED:false}
